<!DOCTYPE html>
<html>

<head>
    <title>Proyecto Drones</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.5);
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        input {
            margin: 10px;
        }

        #resultado {
            margin-top: 20px;
        }

        .success {
            color: #22c55e;
            font-weight: bold;
        }

        img {
            margin-top: 10px;
            border-radius: 10px;
            border: 2px solid #38bdf8;
        }
    </style>
</head>

<body>

    <h1>Sistema de Drones</h1>

    <div class="card">
        <h3>Subir XML</h3>
        <input type="file" id="file" />
        <br>
        <button onclick="subir()">Subir Archivo</button>
    </div>

    <div class="card">
        <h3>Procesar</h3>
        <button onclick="procesar()">Ejecutar Simulacion</button>
    </div>

    <div class="card">
        <h3>Resultado</h3>
        <div id="resultado">Esperando ejecucion...</div>
    </div>

    <h3>Seleccionar Mensaje</h3>
    <select id="mensajes"></select>
    <button onclick="cargarMensajes()">Cargar Mensajes</button>

    <script>
        async function subir() {
            let file = document.getElementById('file').files[0];

            if (!file) {
                alert("Selecciona un archivo primero");
                return;
            }

            let formData = new FormData();
            formData.append('file', file);

            await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            alert('Archivo subido correctamente');
        }


        function descargar(ruta) {
            window.open(ruta, '_blank');
        }
   
        async function cargarMensajes() {
            let res = await fetch('/mensajes');
            let data = await res.json();

            let select = document.getElementById('mensajes');
            select.innerHTML = "";

            data.forEach(m => {
                let option = document.createElement("option");
                option.value = m.nombre;
                option.text = m.nombre;
                select.appendChild(option);
            });
        }

        async function procesar() {
    let select = document.getElementById('mensajes');
    let nombre = select.value;

    if (!nombre) {
        alert("Primero carga y selecciona un mensaje");
        return;
    }

    let res = await fetch(`/procesar/${nombre}`);

    if (!res.ok) {
        alert("Error en el servidor");
        return;
    }

    let data = await res.json();

    let html = `
        <p><b>Sistema:</b> ${data.sistema}</p>
        <p><b>Tiempo optimo:</b> ${data.tiempo}</p>

        <h2>${data.mensaje}</h2>

        <button onclick="descargar('${data.xml}')">Salida XML</button>

        <h3>Sistema</h3>
        <img src="${data.sistemaImg}" width="100%"/>

        <h3>Timeline</h3>
        <img src="${data.timelineImg}" width="100%"/>
    `;

    document.getElementById('resultado').innerHTML = html;
}

        function descargar(ruta) {
            window.open(ruta, '_blank');
        }
    </script>

</body>

</html>
