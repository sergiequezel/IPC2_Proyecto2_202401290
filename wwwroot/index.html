<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>DroneControl - Dashboard</title>
    <style>
        :root {
            --bg-main: #0a0f14;
            --bg-card: #141b24;
            --accent: #10b981; /* Esmeralda */
            --accent-hover: #059669;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 25px;
            align-content: start;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1.1rem;
            margin-top: 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .full-width {
            grid-column: span 2;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0f14;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        ul {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #resultado {
            background: #0a0f14;
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
            border-left: 4px solid var(--accent);
        }

        img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            filter: grayscale(20%);
        }

        @media (max-width: 1000px) {
            .main-content { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h1>DroneControl</h1>
        
        <div class="section">
            <h3>Archivo XML</h3>
            <input type="file" id="file" />
            <button onclick="subir()">Subir Configuración</button>
        </div>

        <div class="section">
            <h3>Drones</h3>
            <input type="text" id="nuevoDron" placeholder="ID del nuevo dron..." />
            <button class="secondary" onclick="agregarDron()">Registrar Dron</button>
            <button style="margin-top: 10px;" onclick="cargarDrones()">Refrescar Lista</button>
            <ul id="listaDrones"></ul>
        </div>
    </div>

    <div class="main-content">
        
        <div class="card">
            <h3>Ejecución</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Selecciona un mensaje del sistema para simular la ruta.</p>
            <select id="mensajes"></select>
            <div style="display: flex; gap: 10px;">
                <button class="secondary" onclick="cargarMensajes()">Listar</button>
                <button onclick="procesar()">Simular</button>
            </div>
        </div>

        <div class="card">
            <h3>Visor de Sistemas</h3>
            <select id="sistemas"></select>
            <div style="display: flex; gap: 10px;">
                <button class="secondary" onclick="cargarSistemas()">Cargar</button>
                <button onclick="verSistema()">Visualizar</button>
            </div>
            <div id="vistaSistema"></div>
        </div>

        <div class="card full-width">
            <h3>Monitor de Resultados</h3>
            <div id="resultado">
                <span style="color: var(--text-secondary)">Listo para procesar datos...</span>
            </div>
        </div>

    </div>

    <script>
        async function subir() {
            let file = document.getElementById('file').files[0];
            if (!file) { alert("Selecciona un archivo"); return; }
            let formData = new FormData();
            formData.append('file', file);
            await fetch('/upload', { method: 'POST', body: formData });
            alert('Archivo subido correctamente');
        }

        async function cargarMensajes() {
            let res = await fetch('/mensajes');
            let data = await res.json();
            let select = document.getElementById('mensajes');
            select.innerHTML = "";
            data.forEach(m => {
                let option = document.createElement("option");
                option.value = m.nombre;
                option.text = m.nombre;
                select.appendChild(option);
            });
        }

        async function procesar() {
            let nombre = document.getElementById('mensajes').value;
            if (!nombre) { alert("Selecciona un mensaje"); return; }
            let res = await fetch(`/procesar/${nombre}`);
            if (!res.ok) { alert("Error en el servidor"); return; }
            let data = await res.json();

            let html = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <p><b style="color:var(--accent)">Sistema:</b> ${data.sistema}</p>
                        <p><b style="color:var(--accent)">Tiempo:</b> ${data.tiempo} seg.</p>
                        <h2 style="margin: 10px 0;">${data.mensaje}</h2>
                        <button onclick="window.open('${data.xml}', '_blank')">Descargar XML</button>
                    </div>
                    <div>
                        <p><b>Vista Previa:</b></p>
                        <img src="${data.sistemaImg}" />
                        <img src="${data.timelineImg}" />
                    </div>
                </div>
            `;
            document.getElementById('resultado').innerHTML = html;
        }

        async function cargarDrones() {
            let res = await fetch('/drones');
            let data = await res.json();
            document.getElementById('listaDrones').innerHTML = data.map(d => `<li>• ${d}</li>`).join('');
        }

        async function agregarDron() {
            let nombre = document.getElementById('nuevoDron').value;
            if (!nombre) return;
            let formData = new FormData();
            formData.append("nombre", nombre);
            await fetch('/drones', { method: 'POST', body: formData });
            cargarDrones();
        }

        async function cargarSistemas() {
            let res = await fetch('/sistemas');
            let data = await res.json();
            let select = document.getElementById('sistemas');
            select.innerHTML = data.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        async function verSistema() {
            let nombre = document.getElementById('sistemas').value;
            if (!nombre) return;
            let res = await fetch(`/sistema/${nombre}`);
            let data = await res.json();
            document.getElementById('vistaSistema').innerHTML = `
                <p style="margin-top:15px; font-weight:bold;">${data.nombre}</p>
                <img src="${data.imagen}" />
            `;
        }
    </script>
</body>
</html>
