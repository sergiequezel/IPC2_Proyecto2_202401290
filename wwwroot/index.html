<!DOCTYPE html>
<html>

<head>
    <title>Proyecto Drones</title>

    <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #e2e8f0;
        text-align: center;
        padding: 40px;
        margin: 0;
    }

    h1 {
        color: #38bdf8;
        font-size: 2.5rem;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    h3 {
        margin-bottom: 10px;
        color: #7dd3fc;
    }

    .card {
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        padding: 25px;
        margin: 20px auto;
        border-radius: 15px;
        width: 420px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.6);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0px 15px 35px rgba(56, 189, 248, 0.2);
    }

    button {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        border: none;
        padding: 10px 18px;
        margin: 8px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        color: #020617;
        transition: all 0.2s ease;
    }

    button:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: white;
    }

    input, select {
        margin: 10px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #020617;
        color: #e2e8f0;
        outline: none;
        transition: border 0.2s;
    }

    input:focus, select:focus {
        border: 1px solid #38bdf8;
    }

    #resultado {
        margin-top: 20px;
        padding: 10px;
    }

    .success {
        color: #22c55e;
        font-weight: bold;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: #020617;
        margin: 5px 0;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #1e293b;
        transition: background 0.2s;
    }

    li:hover {
        background: #1e293b;
    }

    img {
        margin-top: 15px;
        border-radius: 12px;
        border: 2px solid #38bdf8;
        box-shadow: 0px 5px 15px rgba(56, 189, 248, 0.3);
    }
</style>
</head>

<body>

    <h1>Sistema de Drones</h1>

    <div class="card">
        <h3>Subir XML</h3>
        <input type="file" id="file" />
        <br>
        <button onclick="subir()">Subir Archivo</button>
    </div>

    <div class="card">
        <h3>Procesar</h3>
        <button onclick="procesar()">Ejecutar Simulacion</button>
    </div>

    <div class="card">
        <h3>Resultado</h3>
        <div id="resultado">Esperando ejecucion...</div>
    </div>

    <h3>Seleccionar Mensaje</h3>
    <select id="mensajes"></select>
    <button onclick="cargarMensajes()">Cargar Mensajes</button>

    <div class="card">
        <h3>Gestion de Drones</h3>

        <input type="text" id="nuevoDron" placeholder="Nombre del dron" />
        <button onclick="agregarDron()">Agregar</button>

        <br><br>

        <button onclick="cargarDrones()">Ver Drones</button>

        <ul id="listaDrones"></ul>
    </div>

    <div class="card">
            <h3>Gestion de Sistemas</h3>

            <button onclick="cargarSistemas()">Ver Sistemas</button>

            <br><br>

            <select id="sistemas"></select>

            <br>

            <button onclick="verSistema()">Ver Sistema</button>

            <div id="vistaSistema"></div>
        </div>

    <script>
        async function subir() {
            let file = document.getElementById('file').files[0];

            if (!file) {
                alert("Selecciona un archivo primero");
                return;
            }

            let formData = new FormData();
            formData.append('file', file);

            await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            alert('Archivo subido correctamente');
        }


        function descargar(ruta) {
            window.open(ruta, '_blank');
        }

        async function cargarMensajes() {
            let res = await fetch('/mensajes');
            let data = await res.json();

            let select = document.getElementById('mensajes');
            select.innerHTML = "";

            data.forEach(m => {
                let option = document.createElement("option");
                option.value = m.nombre;
                option.text = m.nombre;
                select.appendChild(option);
            });
        }

        async function procesar() {
            let select = document.getElementById('mensajes');
            let nombre = select.value;

            if (!nombre) {
                alert("Primero carga y selecciona un mensaje");
                return;
            }

            let res = await fetch(`/procesar/${nombre}`);

            if (!res.ok) {
                alert("Error en el servidor");
                return;
            }

            let data = await res.json();

            let html = `
        <p><b>Sistema:</b> ${data.sistema}</p>
        <p><b>Tiempo optimo:</b> ${data.tiempo}</p>

        <h2>${data.mensaje}</h2>

        <button onclick="descargar('${data.xml}')">Salida XML</button>

        <h3>Sistema</h3>
        <img src="${data.sistemaImg}" width="100%"/>

        <h3>Timeline</h3>
        <img src="${data.timelineImg}" width="100%"/>
    `;

            document.getElementById('resultado').innerHTML = html;
        }

        function descargar(ruta) {
            window.open(ruta, '_blank');
        }
    </script>

    <script>
        async function cargarDrones() {
            let res = await fetch('/drones');
            let data = await res.json();

            let html = "";

            data.forEach(d => {
                html += `<li>${d}</li>`;
            });

            document.getElementById('listaDrones').innerHTML = html;
        }

        async function agregarDron() {
            let nombre = document.getElementById('nuevoDron').value;

            if (!nombre) {
                alert("Escribe un nombre");
                return;
            }

            let formData = new FormData();
            formData.append("nombre", nombre);

            let res = await fetch('/drones', {
                method: 'POST',
                body: formData
            });

            let text = await res.text();

            alert(text);

            cargarDrones();
        }
    </script>

    <script>
        async function cargarSistemas() {
            let res = await fetch('/sistemas');
            let data = await res.json();

            let select = document.getElementById('sistemas');
            select.innerHTML = "";

            data.forEach(s => {
                let option = document.createElement("option");
                option.value = s;
                option.text = s;
                select.appendChild(option);
            });
        }

        async function verSistema() {
            let nombre = document.getElementById('sistemas').value;

            if (!nombre) {
                alert("Selecciona un sistema");
                return;
            }

            let res = await fetch(`/sistema/${nombre}`);
            let data = await res.json();

            let html = `
        <h4>${data.nombre}</h4>
        <img src="${data.imagen}" width="100%" />
    `;

            document.getElementById('vistaSistema').innerHTML = html;
        }
    </script>

</body>

</html>
